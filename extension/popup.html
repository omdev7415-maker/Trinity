<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DefendLink AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 300px;
            min-height: 200px;
            background: #0a0a0f;
            color: #f8fafc;
            font-family: 'Outfit', system-ui, sans-serif;
            padding: 0;
        }
        .header {
            background: linear-gradient(135deg, rgba(99,102,241,0.3), rgba(236,72,153,0.3));
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-icon { font-size: 22px; }
        .header-title { font-size: 1.1rem; font-weight: 700; }
        .header-title span {
            background: linear-gradient(135deg, #6366f1, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .body { padding: 20px; }
        
        /* Toggle Switch */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 14px;
        }
        .toggle-label { font-size: 0.9rem; color: #94a3b8; }
        .toggle-label strong { color: #f8fafc; display: block; font-size: 1rem; margin-bottom: 2px; }
        
        .toggle {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            transition: 0.3s;
        }
        .toggle-slider:before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #64748b;
            border-radius: 50%;
            transition: 0.3s;
        }
        input:checked + .toggle-slider { background: rgba(99,102,241,0.5); }
        input:checked + .toggle-slider:before { transform: translateX(20px); background: #6366f1; }

        /* Status Pill */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-bottom: 14px;
            border: 1px solid;
        }
        .status-pill.online {
            background: rgba(16,185,129,0.1);
            border-color: rgba(16,185,129,0.3);
            color: #10b981;
        }
        .status-pill.offline {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            color: #ef4444;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .online .status-dot { background: #10b981; box-shadow: 0 0 6px #10b981; animation: blink 2s infinite; }
        .offline .status-dot { background: #ef4444; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
        
        .open-dash-btn {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: opacity 0.2s;
        }
        .open-dash-btn:hover { opacity: 0.85; }
        
        .footer {
            padding: 10px 20px 14px;
            text-align: center;
            font-size: 0.72rem;
            color: #334155;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-icon">🛡️</div>
        <div>
            <div class="header-title"><span>DefendLink AI</span></div>
            <div style="font-size: 0.72rem; color: #64748b;">Real-time Threat Intelligence</div>
        </div>
    </div>

    <div class="body">
        <!-- Engine Status -->
        <div class="status-pill offline" id="status-pill">
            <div class="status-dot"></div>
            <span id="status-text">Checking engine...</span>
        </div>

        <!-- Toggle -->
        <div class="toggle-row">
            <div class="toggle-label">
                <strong>Threat Detection</strong>
                Scan links in real-time
            </div>
            <label class="toggle">
                <input type="checkbox" id="enable-toggle" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <!-- Open Dashboard -->
        <button class="open-dash-btn" id="open-dashboard">Open DefendLink Dashboard ↗</button>
    </div>
    
    <div class="footer">v1.0.0 · Powered by Gemini AI &amp; VirusTotal</div>
    
    <script src="popup.js"></script>
</body>
</html>
